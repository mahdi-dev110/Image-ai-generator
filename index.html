<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Generate stunning, futuristic AI images simply and efficiently.">
    <title>Mahdimg AI - Futuristic Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="favicon .png">
    <link rel="stylesheet" href="img.css">
</head>
<!--const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${w}&height=${h}&seed=${seed}&nologo=true`;-->

<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <aside class="sidebar-controls" aria-label="Image Generation Controls">
            <header class="sidebar-header">
                <h1 class="logo">
                    Mahdimg<span class="ai-badge">AI</span>
                </h1>
                <p class="tagline">Create anything you can imagine.</p>
            </header>

            <form id="generator-form" class="controls-form" onsubmit="return false;">
                <div class="input-group">
                    <label for="prompt">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                        </svg>
                        Describe your image
                    </label>
                    <textarea id="prompt"
                        placeholder="e.g., A futuristic cyberpunk city floating in clouds, vibrant neon lights, 8k resolution..."
                        aria-required="true" autofocus></textarea>
                </div>

                <!-- Advanced Options Toggle -->
                <div class="advanced-section">
                    <button type="button" class="toggle-advanced" id="toggleAdvanced" aria-expanded="false"
                        aria-controls="advancedOptions">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        </svg>
                        Advanced Fine-Tuning
                        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="m6 9 6 6 6-6" />
                        </svg>
                    </button>

                    <div class="advanced-options" id="advancedOptions" role="region">
                        <div class="input-group">
                            <label for="style">Art Style Focus</label>
                            <div class="custom-select">
                                <select id="style">
                                    <option value="">Auto / No Specific Style</option>
                                    <option value=", masterpiece, highly detailed, realistic, 8k">Photorealistic
                                    </option>
                                    <option value=", anime style, studio ghibli, vivid colors">Anime</option>
                                    <option value=", cyberpunk, neon lights, dark synthwave">Cyberpunk</option>
                                    <option value=", fantasy art, concept art, magical atmosphere">Fantasy Concept
                                    </option>
                                    <option value=", minimalist, flat design, vector art">Minimalist Illustration
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="dimension-controls">
                            <div class="input-group">
                                <label for="width">Width (px)</label>
                                <input type="number" id="width" value="1024" min="256" step="64">
                            </div>
                            <div class="input-group">
                                <label for="height">Height (px)</label>
                                <input type="number" id="height" value="1024" min="256" step="64">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" id="generateBtn" class="primary-btn">
                    <span class="btn-text">Generate Masterpiece</span>
                    <span class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="m5 12 7-7 7 7M12 19V5" />
                        </svg>
                    </span>
                </button>
            </form>

            <footer class="sidebar-footer">
                <p>Powered by free, lightning-fast AI endpoints.</p>
            </footer>
        </aside>

        <!-- Main Workspace View -->
        <main class="workspace">
            <div class="output-container">
                <div class="image-stage" id="imageStage">
                    <!-- Default State -->
                    <div class="placeholder-state" id="placeholderState">
                        <div class="icon-ring">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                                <circle cx="9" cy="9" r="2" />
                                <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                            </svg>
                        </div>
                        <h2>Awaiting Inspiration</h2>
                        <p>Enter a prompt on the left to summon your creation.</p>
                    </div>

                    <!-- Loading State -->
                    <div class="loading-state" id="loadingState">
                        <div class="scanning-loader">
                            <div class="scan-line"></div>
                        </div>
                        <div class="loading-text">
                            <span>Synthesizing pixels</span>
                            <span class="dots">...</span>
                        </div>
                    </div>

                    <!-- Result State -->
                    <div class="result-state" id="resultState">
                        <img id="generatedImage" alt="Generated Artwork" />
                        <div class="image-overlay">
                            <div class="image-actions">
                                <button id="downloadBtn" class="action-btn" title="Download Image">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                        <polyline points="7 10 12 15 17 10" />
                                        <line x1="12" x2="12" y1="15" y2="3" />
                                    </svg>
                                </button>
                                <button id="expandBtn" class="action-btn" title="View Fullscreen">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Section -->
            <section class="history-section" aria-labelledby="historyTitle">
                <div class="history-header">
                    <h2 id="historyTitle">Recent Creations</h2>
                    <button id="clearHistoryBtn" class="text-btn">Clear All</button>
                </div>
                <div class="history-track" id="historyTrack">
                    <!-- History items injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Fullscreen Modal -->
    <div class="lightbox-modal" id="lightboxModal" aria-hidden="true">
        <button class="close-modal" id="closeModal" aria-label="Close modal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <img id="lightboxImage" src="" alt="Fullscreen artwork" />
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div> <!-- Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="img.js"></script>
</body>

</html>
